// ── Upcoming Coverage widget ──────────────────────────────────────────────────

function UpcomingWidget() {
  const [data, setData] = useState(null);

  useEffect(() => {
    function load() {
      api('GET', '/api/schedule/upcoming')
        .then(d => setData(d))
        .catch(() => setData({ types: {}, entries: [] }));
    }
    load();
    const poll = setInterval(load, 30000);
    return () => clearInterval(poll);
  }, []);

  if (!data) return <div className="upcoming-empty">Loading…</div>;

  const now = new Date();
  const dow = now.getUTCDay();
  const daysToMon = dow === 0 ? 6 : dow - 1;
  const mon = new Date(now);
  mon.setUTCDate(now.getUTCDate() - daysToMon);
  const nextMon = new Date(mon);
  nextMon.setUTCDate(mon.getUTCDate() + 7);
  const pad = n => String(n).padStart(2, '0');
  const nextMonStr = nextMon.getUTCFullYear() + '-' + pad(nextMon.getUTCMonth()+1) + '-' + pad(nextMon.getUTCDate());

  const REGIONS = ['US', 'NL', 'BNG'];
  const REGION_COLORS = { US: '#3B82F6', NL: '#10B981', BNG: '#F59E0B' };
  const roleOrder = Object.keys(data.types);
  const DAY_ABBR  = ['Su', 'M', 'Tu', 'W', 'Th', 'F', 'Sa'];

  function emptyBucket() {
    const b = {};
    REGIONS.forEach(r => { b[r] = {}; });
    return b;
  }
  const thisWeek = emptyBucket(), nextWeek = emptyBucket();

  for (const e of data.entries) {
    const bucket = e.date < nextMonStr ? thisWeek : nextWeek;
    const reg = e.region || 'US';
    if (!bucket[reg]) bucket[reg] = {};
    if (!bucket[reg][e.assignment]) bucket[reg][e.assignment] = {};
    const fullName = e.first_name + ' ' + e.last_name;
    if (!bucket[reg][e.assignment][fullName]) {
      bucket[reg][e.assignment][fullName] = { name: fullName, dates: [] };
    }
    bucket[reg][e.assignment][fullName].dates.push(e.date);
  }

  function dateDow(dateStr) {
    const [y, m, d] = dateStr.split('-').map(Number);
    return new Date(Date.UTC(y, m - 1, d)).getUTCDay();
  }

  function RegionBlock({ region, roleBucket }) {
    const allRoles = [...new Set([...roleOrder, ...Object.keys(roleBucket)])];
    const rows = [];
    for (const role of allRoles) {
      if (!roleBucket[role]) continue;
      const t = data.types[role] || {};
      const people = Object.values(roleBucket[role]);
      const showDays = people.length > 1;
      for (const person of people) {
        const dayStr = showDays
          ? [...person.dates].sort().map(d => DAY_ABBR[dateDow(d)]).join(', ')
          : '';
        rows.push({ role, name: person.name, dayStr, t });
      }
    }
    if (rows.length === 0) return null;
    const color = REGION_COLORS[region] || 'var(--text-3)';
    return (
      <div style={{ marginBottom: '8px' }}>
        <div style={{
          fontSize: '9.5px', fontWeight: 700, textTransform: 'uppercase',
          letterSpacing: '0.1em', color, marginBottom: '4px',
          paddingBottom: '3px', borderBottom: '1px solid ' + color + '22',
        }}>{region}</div>
        {rows.map((r, i) => (
          <div key={i} className="upcoming-row">
            <span className="upcoming-role" style={{ color: r.t.color || 'var(--text-2)' }}>{r.role}</span>
            <span className="upcoming-sep">—</span>
            <span className="upcoming-who">{r.name}</span>
            {r.dayStr && <span className="upcoming-days">({r.dayStr})</span>}
          </div>
        ))}
      </div>
    );
  }

  function WeekSection({ label, bucket }) {
    const hasAny = REGIONS.some(r => Object.keys(bucket[r] || {}).length > 0);
    return (
      <div style={{ marginBottom: '10px' }}>
        <div className="upcoming-week-lbl">{label}</div>
        {!hasAny
          ? <div className="upcoming-empty">No featured coverage scheduled.</div>
          : REGIONS.map(r => <RegionBlock key={r} region={r} roleBucket={bucket[r] || {}} />)
        }
      </div>
    );
  }

  return (
    <div>
      <WeekSection label="This Week" bucket={thisWeek} />
      <WeekSection label="Next Week" bucket={nextWeek} />
    </div>
  );
}

// ── Roles editor ──────────────────────────────────────────────────────────────

function RolesEditor({ onChanged }) {
  const [types, setTypes]     = useState(null);
  const [saving, setSaving]   = useState(false);
  const [error, setError]     = useState('');
  const [newRole, setNewRole] = useState({ name: '', short: '', color: '#1D4ED8', bg: '#DBEAFE', featured: false, weekendOnly: false });
  const [renaming, setRenaming] = useState({ name: null, value: '' });

  const PRESETS = [
    { color: '#1D4ED8', bg: '#DBEAFE' },
    { color: '#7C3AED', bg: '#EDE9FE' },
    { color: '#059669', bg: '#D1FAE5' },
    { color: '#D97706', bg: '#FEF3C7' },
    { color: '#DC2626', bg: '#FEE2E2' },
    { color: '#0891B2', bg: '#CFFAFE' },
    { color: '#9333EA', bg: '#F3E8FF' },
    { color: '#DB2777', bg: '#FCE7F3' },
    { color: '#15803D', bg: '#DCFCE7' },
    { color: '#B45309', bg: '#FEF9C3' },
    { color: '#374151', bg: '#F3F4F6' },
    { color: '#7F1D1D', bg: '#FFF1F2' },
  ];

  useEffect(() => {
    api('GET', '/api/schedule/types')
      .then(d => setTypes(d))
      .catch(() => setTypes({}));
  }, []);

  async function persist(updated) {
    setSaving(true); setError('');
    try {
      await api('PUT', '/api/schedule/types', updated);
      setTypes(updated);
      onChanged();
    } catch (err) { setError(err.message || 'Save failed.'); }
    finally { setSaving(false); }
  }

  async function toggleFeatured(name) {
    await persist({ ...types, [name]: { ...types[name], featured: !types[name].featured } });
  }
  async function toggleWeekendOnly(name) {
    await persist({ ...types, [name]: { ...types[name], weekendOnly: !types[name].weekendOnly } });
  }
  async function deleteRole(name) {
    if (!window.confirm('Delete "' + name + '"? Existing schedule entries won\'t be deleted.')) return;
    const updated = { ...types };
    delete updated[name];
    await persist(updated);
  }
  async function commitRename() {
    const oldName = renaming.name;
    const newName = renaming.value.trim();
    if (!newName) { setRenaming({ name: null, value: '' }); return; }
    if (newName === oldName) { setRenaming({ name: null, value: '' }); return; }
    if (types[newName]) { setError('"' + newName + '" already exists.'); return; }
    setSaving(true); setError('');
    try {
      await api('PUT', '/api/schedule/rename-role', { oldName, newName });
      const fresh = await api('GET', '/api/schedule/types');
      setTypes(fresh);
      onChanged();
      setRenaming({ name: null, value: '' });
    } catch (err) { setError(err.message || 'Rename failed.'); }
    finally { setSaving(false); }
  }
  async function addRole() {
    const name  = newRole.name.trim();
    const short = newRole.short.trim().toUpperCase();
    if (!name || !short) { setError('Role name and short code are required.'); return; }
    if (types[name]) { setError('"' + name + '" already exists.'); return; }
    setError('');
    await persist({ ...types, [name]: { color: newRole.color, bg: newRole.bg, short, featured: newRole.featured, weekendOnly: newRole.weekendOnly } });
    setNewRole({ name: '', short: '', color: '#1D4ED8', bg: '#DBEAFE', featured: false, weekendOnly: false });
  }

  if (!types) return <div className="sched-empty">Loading roles…</div>;

  return (
    <div>
      <div className="roles-hint">
        Roles marked <strong>&#9733;</strong> appear in the <strong>Upcoming Coverage</strong> widget. A person can hold multiple roles on the same day.
      </div>
      <table className="roles-table">
        <thead>
          <tr>
            <th>Role</th>
            <th>Short Code</th>
            <th style={{textAlign:'center'}}>&#9733; Upcoming</th>
            <th style={{textAlign:'center'}}>&#9940; Weekdays</th>
            <th></th>
          </tr>
        </thead>
        <tbody>
          {Object.keys(types).length === 0 && (
            <tr><td colSpan="5" style={{color:'var(--text-3)',fontSize:'12.5px',padding:'16px 12px',fontStyle:'italic'}}>No roles yet — add one below.</td></tr>
          )}
          {Object.entries(types).map(([name, t]) => {
            const isRenaming = renaming.name === name;
            return (
              <tr key={name}>
                <td>
                  <span className="sched-pill" style={{background: t.bg, color: t.color}}>{t.short}</span>
                  {isRenaming ? (
                    <span style={{display:'inline-flex',alignItems:'center',gap:'6px',marginLeft:'8px'}}>
                      <input
                        autoFocus
                        className="roles-add-input"
                        style={{width:'160px',padding:'4px 8px',fontSize:'13px'}}
                        value={renaming.value}
                        onChange={e => setRenaming(r => ({...r, value: e.target.value}))}
                        onKeyDown={e => { if (e.key === 'Enter') commitRename(); if (e.key === 'Escape') setRenaming({ name: null, value: '' }); }}
                      />
                      <button className="sched-add-btn" style={{padding:'4px 9px',fontSize:'12px'}} onClick={commitRename} disabled={saving}>&#10003;</button>
                      <button className="role-del-btn" onClick={() => setRenaming({ name: null, value: '' })} title="Cancel">&#10005;</button>
                    </span>
                  ) : (
                    <span style={{marginLeft:'8px'}}>
                      {name}
                      <button className="role-rename-btn" onClick={() => setRenaming({ name, value: name })} disabled={saving} title="Rename">&#9998;</button>
                    </span>
                  )}
                </td>
                <td><code style={{fontSize:'11.5px',color:'var(--text-2)',background:'var(--surface-2)',padding:'2px 6px',borderRadius:'4px',border:'1px solid var(--border)'}}>{t.short}</code></td>
                <td style={{textAlign:'center'}}>
                  <button className={'role-feat-btn' + (t.featured ? ' active' : '')} onClick={() => toggleFeatured(name)} disabled={saving || isRenaming}>
                    {t.featured ? '★' : '☆'}
                  </button>
                </td>
                <td style={{textAlign:'center'}}>
                  <button
                    className={'role-feat-btn' + (t.weekendOnly ? ' active' : '')}
                    onClick={() => toggleWeekendOnly(name)}
                    disabled={saving || isRenaming}
                    style={t.weekendOnly ? {color:'var(--amber)',opacity:1} : {}}
                  >
                    {t.weekendOnly ? '🏖' : '—'}
                  </button>
                </td>
                <td>
                  <button className="role-del-btn" onClick={() => deleteRole(name)} disabled={saving || isRenaming} title="Delete">&#10005;</button>
                </td>
              </tr>
            );
          })}
        </tbody>
      </table>

      <div className="roles-add-section">
        <div style={{fontSize:'10px',fontWeight:700,color:'var(--text-3)',textTransform:'uppercase',letterSpacing:'0.09em',marginBottom:'12px'}}>Add New Role</div>
        {error && <p style={{fontSize:'12px',color:'var(--red)',marginBottom:'10px'}}>{error}</p>}
        <div style={{display:'grid',gridTemplateColumns:'1fr 120px',gap:'8px',marginBottom:'10px'}}>
          <div>
            <label className="roles-add-lbl">Role Name</label>
            <input className="roles-add-input" placeholder="e.g. On Call" value={newRole.name}
              onChange={e => setNewRole(r => ({...r, name: e.target.value}))} />
          </div>
          <div>
            <label className="roles-add-lbl">Short Code</label>
            <input className="roles-add-input" placeholder="ONC" maxLength="6" value={newRole.short}
              onChange={e => setNewRole(r => ({...r, short: e.target.value.toUpperCase()}))} />
          </div>
        </div>
        <div style={{marginBottom:'12px'}}>
          <label className="roles-add-lbl">Color</label>
          <div className="color-presets">
            {PRESETS.map((p, i) => (
              <div key={i}
                className={'color-swatch' + (newRole.color === p.color ? ' selected' : '')}
                style={{background:'linear-gradient(135deg,' + p.bg + ' 50%,' + p.color + ' 50%)',borderColor: newRole.color === p.color ? p.color : 'transparent'}}
                onClick={() => setNewRole(r => ({...r, color: p.color, bg: p.bg}))}
              />
            ))}
          </div>
          <div style={{marginTop:'8px',display:'flex',alignItems:'center',gap:'8px'}}>
            <span className="sched-pill" style={{background: newRole.bg, color: newRole.color}}>{newRole.short || 'ABC'}</span>
            <span style={{fontSize:'11px',color:'var(--text-3)'}}>preview</span>
          </div>
        </div>
        <div style={{display:'flex',alignItems:'center',gap:'12px',flexWrap:'wrap'}}>
          <label className="role-check">
            <input type="checkbox" checked={newRole.featured} onChange={e => setNewRole(r => ({...r, featured: e.target.checked}))} />
            Show in Upcoming (&#9733;)
          </label>
          <label className="role-check">
            <input type="checkbox" checked={newRole.weekendOnly} onChange={e => setNewRole(r => ({...r, weekendOnly: e.target.checked}))} />
            Weekends only
          </label>
          <button className="sched-add-btn" onClick={addRole} disabled={saving || !newRole.name.trim() || !newRole.short.trim()}>
            {saving ? 'Saving…' : '+ Add Role'}
          </button>
        </div>
      </div>
    </div>
  );
}

// ── Import / Export ───────────────────────────────────────────────────────────

function ImportExport({ selectedYear }) {
  const [exporting, setExporting]   = useState(false);
  const [importing, setImporting]   = useState(false);
  const [importResult, setImportResult] = useState(null);
  const [clearFirst, setClearFirst] = useState(false);
  const [fileLabel, setFileLabel]   = useState('Choose JSON file…');
  const fileRef = React.useRef();

  async function doExport() {
    setExporting(true);
    try {
      const res  = await fetch('/api/schedule/export?year=' + selectedYear);
      if (!res.ok) throw new Error(await res.text());
      const blob = await res.blob();
      const url  = URL.createObjectURL(blob);
      const a    = document.createElement('a');
      a.href = url; a.download = 'assigner-schedule-' + selectedYear + '.json'; a.click();
      URL.revokeObjectURL(url);
    } catch (e) { alert('Export failed: ' + e.message); }
    setExporting(false);
  }

  async function doImport() {
    const file = fileRef.current && fileRef.current.files[0];
    if (!file) { alert('Please choose a JSON file first.'); return; }
    setImporting(true); setImportResult(null);
    try {
      const text = await file.text();
      const json = JSON.parse(text);
      const res  = await fetch('/api/schedule/import', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ entries: json.entries || json, clearFirst }),
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || res.statusText);
      setImportResult({ ok: true, inserted: data.imported, skipped: data.skipped });
      setFileLabel('Choose JSON file…');
      if (fileRef.current) fileRef.current.value = '';
    } catch (e) { setImportResult({ ok: false, message: e.message }); }
    setImporting(false);
  }

  return (
    <div style={{ padding: '20px' }}>
      <div style={{marginBottom:'24px'}}>
        <div className="backup-title">Export Schedule</div>
        <div className="backup-desc">Download all schedule entries for <strong>{selectedYear}</strong> as a JSON file.</div>
        <button className="btn btn-primary" onClick={doExport} disabled={exporting} style={{marginTop:'10px'}}>
          {exporting ? 'Exporting…' : 'Export ' + selectedYear + ' Schedule'}
        </button>
      </div>
      <div>
        <div className="backup-title">Import Schedule</div>
        <div className="backup-desc">Upload a previously exported JSON file to restore or merge entries. Members are matched by name and region.</div>
        <label className="import-file-label" style={{marginTop:'10px'}}>
          &#128206; {fileLabel}
          <input ref={fileRef} type="file" accept=".json,application/json" className="import-file-input"
            onChange={e => setFileLabel(e.target.files[0] ? e.target.files[0].name : 'Choose JSON file…')} />
        </label>
        <label style={{display:'flex',alignItems:'center',gap:'7px',marginTop:'10px',fontSize:'13px',cursor:'pointer',color:'var(--text-2)'}}>
          <input type="checkbox" checked={clearFirst} onChange={e => setClearFirst(e.target.checked)} />
          Clear existing entries before loading
        </label>
        <button className="btn btn-primary" onClick={doImport} disabled={importing} style={{marginTop:'10px'}}>
          {importing ? 'Importing…' : 'Import Schedule'}
        </button>
        {importResult && (
          <div className="import-result" style={{
            background: importResult.ok ? 'var(--green-bg)' : 'var(--red-bg)',
            border: '1px solid ' + (importResult.ok ? 'var(--green-bd)' : 'var(--red-bd)'),
            color: importResult.ok ? 'var(--green)' : 'var(--red)',
          }}>
            {importResult.ok
              ? '✓ Import complete — ' + importResult.inserted + ' entries added, ' + importResult.skipped + ' skipped.'
              : '✗ Import failed: ' + importResult.message}
          </div>
        )}
      </div>
    </div>
  );
}

// ── Inline cell editor ────────────────────────────────────────────────────────

function InlineCell({ dateStr, member, region, types, isWeekend, initialEntries, active, onActivate, onChanged }) {
  const [localEntries, setLocalEntries] = useState(null);
  const [selected, setSelected]         = useState('');
  const [saving, setSaving]             = useState(false);
  const ref = React.useRef();

  const entries = active ? (localEntries !== null ? localEntries : initialEntries) : initialEntries;

  useEffect(() => {
    if (active) { setLocalEntries(initialEntries); setSelected(''); }
    else { setLocalEntries(null); setSelected(''); }
  }, [active]);

  useEffect(() => {
    if (!active) return;
    function handler(e) { if (ref.current && !ref.current.contains(e.target)) onActivate(null); }
    document.addEventListener('mousedown', handler);
    return () => document.removeEventListener('mousedown', handler);
  }, [active]);

  const availableTypes = Object.keys(types).filter(name => {
    if (types[name].weekendOnly && !isWeekend) return false;
    if (entries.some(e => e.assignment === name)) return false;
    return true;
  });

  async function handleAdd() {
    if (!selected || saving) return;
    setSaving(true);
    try {
      const result = await api('POST', '/api/schedule/entry', {
        date: dateStr, member_id: member.id, assignment: selected, region
      });
      setLocalEntries(prev => [...(prev !== null ? prev : initialEntries), { id: result.id, assignment: selected }]);
      setSelected('');
      onChanged();
    } catch {}
    finally { setSaving(false); }
  }

  async function handleRemove(id) {
    setLocalEntries(prev => (prev !== null ? prev : initialEntries).filter(e => e.id !== id));
    try {
      await api('DELETE', '/api/schedule/entry/' + id);
      onChanged();
    } catch { setLocalEntries(initialEntries); }
  }

  if (active) {
    return (
      <td ref={ref} className="sched-cell sched-cell-active">
        <div className="sched-cell-inner">
          <div className="sched-pills" style={{justifyContent:'flex-start'}}>
            {entries.length === 0
              ? <span style={{fontSize:'11px',color:'var(--text-3)',fontStyle:'italic'}}>none</span>
              : entries.map(e => {
                  const t = types[e.assignment] || {};
                  return (
                    <span key={e.id} className="sched-pill" style={{background: t.bg || '#eee', color: t.color || '#333'}}>
                      {t.short || e.assignment}
                      <button className="sched-pill-x" onClick={() => handleRemove(e.id)} title="Remove">&#10005;</button>
                    </span>
                  );
                })}
          </div>
          {availableTypes.length > 0 && (
            <div className="sched-inline-add">
              <select className="sched-inline-select" value={selected}
                onChange={e => setSelected(e.target.value)}
                onKeyDown={e => { if (e.key === 'Enter') handleAdd(); }}>
                <option value="">+ add…</option>
                {availableTypes.map(name => {
                  const t = types[name] || {};
                  return <option key={name} value={name}>{t.short || name}</option>;
                })}
              </select>
              {selected && (
                <button className="sched-inline-btn" onClick={handleAdd} disabled={saving}>
                  {saving ? '…' : '✓'}
                </button>
              )}
            </div>
          )}
        </div>
      </td>
    );
  }

  return (
    <td ref={ref} className="sched-cell" onClick={() => onActivate(dateStr + '|' + member.id)}>
      <div className="sched-pills">
        {entries.map(e => {
          const t = types[e.assignment] || {};
          return (
            <span key={e.id} className="sched-pill" style={{background: t.bg || '#eee', color: t.color || '#333'}}>
              {t.short || e.assignment}
            </span>
          );
        })}
        {entries.length === 0 && <span className="sched-cell-add">+</span>}
      </div>
    </td>
  );
}

// ── Scheduler view ────────────────────────────────────────────────────────────

function SchedulerView({ region }) {
  const now = new Date();
  const [schedView, setSchedView]   = useState('calendar');
  const [data, setData]             = useState(null);
  const [loading, setLoading]       = useState(true);
  const [refreshing, setRefreshing] = useState(false);
  const [fetchError, setFetchError] = useState(null);
  const [selectedYear, setSelectedYear] = useState(now.getFullYear());
  const [monthIdx, setMonthIdx]     = useState(now.getMonth());
  const [activeCell, setActiveCell] = useState(null);

  function loadData(background) {
    if (background) { setRefreshing(true); }
    else { setLoading(true); setFetchError(null); }
    api('GET', '/api/schedule?region=' + region + '&year=' + selectedYear)
      .then(d => { setData(d); setLoading(false); setRefreshing(false); })
      .catch(err => {
        setFetchError(err.message || 'Failed to load schedule.');
        setData(null); setLoading(false); setRefreshing(false);
      });
  }

  useEffect(() => { loadData(false); }, [region, selectedYear]);

  const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  const DAYS   = ['Su','Mo','Tu','We','Th','Fr','Sa'];

  function isoWeek(date) {
    const d = new Date(Date.UTC(date.getUTCFullYear(), date.getUTCMonth(), date.getUTCDate()));
    d.setUTCDate(d.getUTCDate() + 4 - (d.getUTCDay() || 7));
    const y = d.getUTCFullYear();
    return Math.ceil((((d - Date.UTC(y,0,1)) / 86400000) + 1) / 7);
  }

  function p2(n) { return String(n).padStart(2, '0'); }
  function fmtDate(y, m, d) { return y + '-' + p2(m+1) + '-' + p2(d); }

  const subNav = (
    <div className="sched-subnav">
      <button className={'sched-tab' + (schedView === 'calendar' ? ' active' : '')} onClick={() => setSchedView('calendar')}>&#128197; Calendar</button>
      <button className={'sched-tab' + (schedView === 'roles'    ? ' active' : '')} onClick={() => setSchedView('roles')}>&#9881; Manage Roles</button>
      <button className={'sched-tab' + (schedView === 'backup'   ? ' active' : '')} onClick={() => setSchedView('backup')}>&#128230; Backup</button>
      <div className="year-nav">
        <button className="year-btn" onClick={() => setSelectedYear(y => y - 1)}>&#8249;</button>
        <span className="year-lbl">{selectedYear}</span>
        <button className="year-btn" onClick={() => setSelectedYear(y => y + 1)}>&#8250;</button>
      </div>
    </div>
  );

  if (schedView === 'roles') return <div>{subNav}<div className="sched-section"><RolesEditor onChanged={() => loadData(true)} /></div></div>;
  if (schedView === 'backup') return <div>{subNav}<div className="sched-section"><ImportExport selectedYear={selectedYear} /></div></div>;
  if (loading) return <div>{subNav}<div className="sched-empty">Loading…</div></div>;
  if (fetchError) return (
    <div>{subNav}
      <div className="sched-empty" style={{color:'var(--red)'}}>
        &#9888; Could not load schedule: <strong>{fetchError}</strong>
      </div>
    </div>
  );

  const types   = (data && data.types)   || {};
  const entries = (data && data.entries) || [];
  const members = (data && data.members) || [];

  const lookup = {};
  for (const e of entries) {
    const k = e.date + '|' + e.member_id;
    if (!lookup[k]) lookup[k] = [];
    lookup[k].push({ id: e.id, assignment: e.assignment });
  }

  const summary = {};
  for (const e of entries) {
    if (!summary[e.assignment]) summary[e.assignment] = {};
    summary[e.assignment][e.member_id] = (summary[e.assignment][e.member_id] || 0) + 1;
  }

  const daysInMonth = new Date(Date.UTC(selectedYear, monthIdx + 1, 0)).getUTCDate();
  const todayStr = fmtDate(now.getFullYear(), now.getMonth(), now.getDate());

  if (members.length === 0) return (
    <div>{subNav}
      <div className="sched-empty">No team members in <strong>{region}</strong> yet.</div>
    </div>
  );

  return (
    <div>
      {subNav}

      <div className="sched-nav">
        <button className="sched-nav-btn" onClick={() => setMonthIdx(m => (m + 11) % 12)}>&#8249;</button>
        <span className="sched-nav-title">{MONTHS[monthIdx]}</span>
        <button className="sched-nav-btn" onClick={() => setMonthIdx(m => (m + 1) % 12)}>&#8250;</button>
        {(monthIdx !== now.getMonth() || selectedYear !== now.getFullYear()) && (
          <button className="sched-today" onClick={() => { setMonthIdx(now.getMonth()); setSelectedYear(now.getFullYear()); }}>Today</button>
        )}
      </div>

      <div className="sched-section">
        <div className="sched-section-hd">Year-to-Date Summary</div>
        <div className="sched-table-wrap">
          <table className="sched-table">
            <thead>
              <tr>
                <th className="sched-type-col">Role</th>
                {members.map(m => (
                  <th key={m.id}>{m.first_name}<br /><span style={{fontWeight:400,opacity:0.6}}>{m.last_name}</span></th>
                ))}
              </tr>
            </thead>
            <tbody>
              {Object.entries(types).map(([name, t]) => (
                <tr key={name}>
                  <td>
                    <span className="sched-pill" style={{background: t.bg, color: t.color}}>{t.short}</span>
                    <span style={{marginLeft:'8px',fontSize:'12.5px'}}>{name}</span>
                    {t.featured && <span style={{marginLeft:'4px',color:'var(--yellow-dk)',fontWeight:700,fontSize:'12px'}}>&#9733;</span>}
                  </td>
                  {members.map(m => {
                    const cnt = ((summary[name] || {})[m.id]) || 0;
                    return (
                      <td key={m.id} className="sched-count" style={cnt === 0 ? {opacity:0.25} : {}}>
                        {cnt === 0 ? '—' : cnt}
                      </td>
                    );
                  })}
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      </div>

      <div className="sched-section">
        <div className="sched-section-hd">
          {MONTHS[monthIdx]} {selectedYear}
          <span style={{fontSize:'10px',color:'var(--text-3)',marginLeft:'8px',fontWeight:400}}>Click any cell to edit</span>
        </div>
        <div className="sched-table-wrap">
          <table className="sched-table sched-grid-table">
            <thead>
              <tr>
                <th className="wk-col">Wk</th>
                <th className="dt-col">Day</th>
                <th className="dy-col"></th>
                {members.map(m => (
                  <th key={m.id}>{m.first_name}<br /><span style={{fontWeight:400,opacity:0.6}}>{m.last_name}</span></th>
                ))}
              </tr>
            </thead>
            <tbody>
              {Array.from({ length: daysInMonth }, function(_, i) {
                const day = i + 1;
                const dt  = new Date(Date.UTC(selectedYear, monthIdx, day));
                const dow = dt.getUTCDay();
                const dateStr   = fmtDate(selectedYear, monthIdx, day);
                const isWeekend = dow === 0 || dow === 6;
                const isToday   = dateStr === todayStr;
                const showWk    = dow === 1;
                const wk        = showWk ? isoWeek(dt) : '';
                return (
                  <tr key={day} className={isToday ? 'today' : isWeekend ? 'weekend' : ''}>
                    <td className="wk-cell">{wk}</td>
                    <td className="dt-cell">{p2(day)}</td>
                    <td className="dy-cell">{DAYS[dow]}</td>
                    {members.map(m => {
                      const k = dateStr + '|' + m.id;
                      return (
                        <InlineCell
                          key={m.id}
                          dateStr={dateStr}
                          member={m}
                          region={region}
                          types={types}
                          isWeekend={isWeekend}
                          initialEntries={lookup[k] || []}
                          active={activeCell === k}
                          onActivate={setActiveCell}
                          onChanged={() => loadData(true)}
                        />
                      );
                    })}
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
      </div>
    </div>
  );
}

// ── App ───────────────────────────────────────────────────────────────────────

function App() {
  const [members, setMembers]         = useState([]);
  const [history, setHistory]         = useState([]);
  const [pendingPick, setPendingPick] = useState(null);
  const [picking, setPicking]         = useState(false);
  const [toast, setToast]             = useState(null);
  const [darkMode, setDarkMode]       = useState(function() { return localStorage.getItem('theme') === 'dark'; });
  const [draggingId, setDraggingId]   = useState(null);
  const [dropOver, setDropOver]       = useState(false);
  const [balanceMode, setBalanceMode] = useState(false);
  const [region, setRegion]           = useState(function() { return localStorage.getItem('region') || 'US'; });
  const [view, setView]               = useState('assigner');
  const dragCounter                   = React.useRef(0);

  useEffect(() => {
    document.documentElement.setAttribute('data-theme', darkMode ? 'dark' : 'light');
    localStorage.setItem('theme', darkMode ? 'dark' : 'light');
  }, [darkMode]);

  useEffect(() => { localStorage.setItem('region', region); }, [region]);

  const showToast = (msg, type) => setToast({ message: msg, type: type || 'info' });

  const sortMembers = list =>
    [...list].sort((a, b) =>
      (b.is_checked_in - a.is_checked_in) ||
      a.last_name.localeCompare(b.last_name) ||
      a.first_name.localeCompare(b.first_name)
    );

  const loadMembers = useCallback(async function() {
    const data = await api('GET', '/api/members?region=' + region).catch(function() { return []; });
    setMembers(sortMembers(data));
  }, [region]);

  const loadHistory = useCallback(async function() {
    const data = await api('GET', '/api/history?region=' + region).catch(function() { return []; });
    setHistory(data);
  }, [region]);

  useEffect(() => {
    loadMembers();
    loadHistory();
    const poll = setInterval(loadMembers, 30000);
    return () => clearInterval(poll);
  }, [loadMembers, loadHistory]);

  function handleAdded(member) {
    setMembers(prev => sortMembers([...prev, member]));
    showToast(member.first_name + ' ' + member.last_name + ' added.', 'success');
  }

  async function handleCheckin(id) {
    try {
      const updated = await api('POST', '/api/members/' + id + '/checkin');
      setMembers(prev => sortMembers(prev.map(m => m.id === id ? updated : m)));
      showToast("Checked in — you're in the pool.", 'success');
    } catch (err) { showToast(err.message, 'error'); }
  }

  async function handleCheckout(id, duration_minutes) {
    try {
      const updated = await api('POST', '/api/members/' + id + '/checkout', { duration_minutes });
      setMembers(prev => sortMembers(prev.map(m => m.id === id ? updated : m)));
      showToast(duration_minutes ? 'Checked out — timer set.' : 'Checked out for the rest of the day.', 'info');
    } catch (err) { showToast(err.message, 'error'); }
  }

  async function handleRemove(id) {
    try {
      await api('DELETE', '/api/members/' + id);
      setMembers(prev => prev.filter(m => m.id !== id));
      showToast('Removed.', 'info');
    } catch { showToast('Could not remove.', 'error'); }
  }

  async function handlePick() {
    setPicking(true);
    try {
      const result = await api('POST', '/api/pick', balanceMode ? { balanced: true, region } : { region });
      setPendingPick(result);
    } catch (err) { showToast(err.message || 'Could not pick.', 'error'); }
    finally { setPicking(false); }
  }

  async function handleManualPick(id) {
    try {
      const result = await api('POST', '/api/members/' + id + '/pick');
      setPendingPick(result);
    } catch (err) { showToast(err.message || 'Could not assign.', 'error'); }
  }

  function handleDragStart(id) { setDraggingId(id); }
  function handleDragEnd()     { setDraggingId(null); setDropOver(false); dragCounter.current = 0; }
  function handleDropZoneEnter(e) { e.preventDefault(); dragCounter.current += 1; if (draggingId) setDropOver(true); }
  function handleDropZoneLeave()  { dragCounter.current -= 1; if (dragCounter.current <= 0) { setDropOver(false); dragCounter.current = 0; } }
  function handleDropZoneOver(e)  { e.preventDefault(); e.dataTransfer.dropEffect = 'move'; }
  function handleDrop(e) { e.preventDefault(); setDropOver(false); dragCounter.current = 0; if (draggingId) { handleManualPick(draggingId); setDraggingId(null); } }

  async function handleConfirm() {
    try {
      await api('POST', '/api/pick/' + pendingPick.pick_id + '/confirm');
      const name   = pendingPick.member.first_name + ' ' + pendingPick.member.last_name;
      const fresh  = await api('GET', '/api/members?region=' + region).catch(function() { return null; });
      const sorted = fresh ? sortMembers(fresh) : null;

      if (balanceMode) {
        if (sorted) {
          const checkedIn  = sorted.filter(m => m.is_checked_in);
          const counts     = checkedIn.map(m => m.pick_count);
          const isBalanced = checkedIn.length > 0 && counts.every(c => c === counts[0]);
          if (isBalanced) {
            setMembers(sorted.map(m => ({ ...m, current_cycle_assigned: 0 })));
            setBalanceMode(false);
            showToast('Balance reached — switching back to cycle mode.', 'success');
          } else {
            setMembers(sorted);
            showToast('Assigned to ' + name + '.', 'success');
          }
        } else { showToast('Assigned to ' + name + '.', 'success'); }
      } else {
        if (sorted) {
          const checkedIn     = sorted.filter(m => m.is_checked_in);
          const cycleComplete = checkedIn.length > 0 && checkedIn.every(m => m.current_cycle_assigned);
          setMembers(cycleComplete ? sorted.map(m => ({ ...m, current_cycle_assigned: 0 })) : sorted);
        }
        showToast('Assigned to ' + name + '.', 'success');
      }
      setPendingPick(null);
      loadHistory();
    } catch { showToast('Failed to confirm.', 'error'); }
  }

  async function handleUnavailable() {
    try { await api('POST', '/api/pick/' + pendingPick.pick_id + '/cancel'); } catch {}
    setPendingPick(null);
    showToast('Cancelled — try again.', 'info');
  }

  async function handleReset() {
    try {
      await api('POST', '/api/reset', { region });
      await loadMembers();
      await loadHistory();
      showToast('Reset complete.', 'info');
    } catch { showToast('Reset failed.', 'error'); }
  }

  const available         = members.filter(m => m.is_checked_in).length;
  const total             = members.length;
  const totalAssign       = members.reduce((s, m) => s + m.pick_count, 0);
  const assignedThisCycle = members.filter(m => m.current_cycle_assigned).length;
  const showCycleLegend   = total > 0 && assignedThisCycle > 0;

  const checkedInMembers = members.filter(m => m.is_checked_in);
  const balanceMaxCount  = balanceMode && checkedInMembers.length > 0
    ? Math.max(...checkedInMembers.map(m => m.pick_count)) : -1;
  const balanceAllEqual  = balanceMode && checkedInMembers.length > 0
    && checkedInMembers.every(m => m.pick_count === balanceMaxCount);

  return (
    <>
      {/* ── Sidebar ── */}
      <aside className="sidebar">
        <div className="sb-brand">
          <div className="sb-logo"><ShellLogo size={22} /></div>
          <div>
            <div className="sb-title">Assigner</div>
            <div className="sb-sub">Work Assignment Tool</div>
          </div>
        </div>

        <nav className="sb-nav">
          <div className="sb-section-label">Navigation</div>
          <button className={'nav-btn' + (view === 'assigner' ? ' active' : '')} onClick={() => setView('assigner')}>
            <span className="nav-ico">&#9889;</span> Assigner
          </button>
          <button className={'nav-btn' + (view === 'scheduler' ? ' active' : '')} onClick={() => setView('scheduler')}>
            <span className="nav-ico">&#128197;</span> Scheduler
          </button>
        </nav>

        <div className="sb-region">
          <div className="region-label">Region</div>
          <div className="region-btns">
            {['US','NL','BNG'].map(r => (
              <button key={r} className={'region-btn' + (region === r ? ' active' : '')} onClick={() => setRegion(r)}>{r}</button>
            ))}
          </div>
        </div>

        <div className="sb-stats">
          <div className="sb-stat">
            <span className="sb-stat-lbl">Available</span>
            <span className={'sb-stat-val' + (available > 0 ? ' green' : '')}>{available}</span>
          </div>
          <div className="sb-stat">
            <span className="sb-stat-lbl">Total Members</span>
            <span className="sb-stat-val">{total}</span>
          </div>
          <div className="sb-stat">
            <span className="sb-stat-lbl">All-time Assignments</span>
            <span className="sb-stat-val">{totalAssign}</span>
          </div>
        </div>

        <div className="sb-bottom">
          <button className="theme-btn" onClick={() => setDarkMode(d => !d)}>
            <span>{darkMode ? '☀' : '🌙'}</span>
            <span>{darkMode ? 'Light Mode' : 'Dark Mode'}</span>
          </button>
        </div>
      </aside>

      {/* ── Main ── */}
      <main className="main">
        {view === 'scheduler' && <SchedulerView region={region} />}

        {view === 'assigner' && (
          <div className="assigner-grid">
            {/* Left column */}
            <div className="a-left">
              <div className="card">
                <div className="card-head">
                  <span className="card-title">Add Team Member — {region}</span>
                </div>
                <div className="add-form">
                  <RegisterForm onAdded={handleAdded} region={region} />
                </div>
              </div>

              <div className="card">
                <div className="card-head">
                  <span className="card-title">Team Roster</span>
                  <span className="card-badge">{total}</span>
                </div>
                <div className="card-body">
                  {showCycleLegend && (
                    <div className="cycle-legend">
                      <span className="cy-dot" />
                      {assignedThisCycle} of {available || total} assigned this cycle
                    </div>
                  )}
                  {total === 0 ? (
                    <div className="empty-state">No one on the roster yet.<br />Add yourself above.</div>
                  ) : (
                    <div className="member-list">
                      {members.map(m => (
                        <MemberCard
                          key={m.id}
                          member={m}
                          onCheckin={handleCheckin}
                          onCheckout={handleCheckout}
                          onRemove={handleRemove}
                          onDragStart={handleDragStart}
                          onDragEnd={handleDragEnd}
                          isDragging={draggingId === m.id}
                          balanceExcluded={balanceMode && !balanceAllEqual && m.is_checked_in && m.pick_count >= balanceMaxCount}
                        />
                      ))}
                    </div>
                  )}
                </div>
              </div>
            </div>

            {/* Right column */}
            <div className="a-right">
              <div className="card">
                <div className="card-head">
                  <span className="card-title">Assign Work Item</span>
                </div>
                <div className="assign-body">
                  {total > 0 && (
                    <div className="stats-row">
                      <div className="stat-chip">
                        <span className={'val' + (available > 0 ? ' green' : '')}>{available}</span>
                        <span className="lbl">Available</span>
                      </div>
                      <div className="stat-chip">
                        <span className="val">{total - available}</span>
                        <span className="lbl">Out</span>
                      </div>
                      {!balanceMode && (
                        <div className="stat-chip">
                          <span className="val">{assignedThisCycle}/{available || total}</span>
                          <span className="lbl">This Cycle</span>
                        </div>
                      )}
                    </div>
                  )}

                  <button
                    className={'btn-assign' + (dropOver ? ' drop-over' : '')}
                    onClick={handlePick}
                    disabled={picking || available === 0}
                    onDragEnter={handleDropZoneEnter}
                    onDragLeave={handleDropZoneLeave}
                    onDragOver={handleDropZoneOver}
                    onDrop={handleDrop}
                  >
                    {dropOver ? '⚡ Drop to Assign' : picking ? 'Selecting…' : '⚡ Assign Someone'}
                  </button>

                  <p className={'assign-drag-hint' + (draggingId ? ' visible' : '')}>
                    Drop here to manually assign
                  </p>
                  <p className="assign-hint" style={{display: draggingId ? 'none' : undefined}}>
                    {available === 0
                      ? (total === 0
                        ? 'Add team members to get started.'
                        : 'No one is checked in right now.')
                      : balanceMode
                        ? 'Balancing across ' + available + ' available — those with fewer assignments go first.'
                        : 'Picks from ' + available + ' available — each person is picked once before the cycle repeats.'
                    }
                  </p>

                  <div className="balance-row" onClick={() => setBalanceMode(b => !b)}>
                    <div className={'toggle-track' + (balanceMode ? ' on' : '')}>
                      <div className="toggle-thumb" />
                    </div>
                    <span className={'balance-lbl' + (balanceMode ? ' on' : '')}>Balance Us</span>
                  </div>
                  {balanceMode && (
                    <p className="balance-desc">
                      Cycles paused. Members with fewer total assignments are picked first until everyone is even.
                    </p>
                  )}
                </div>
              </div>

              <div className="card">
                <div className="card-head">
                  <span className="card-title">Upcoming Coverage</span>
                  <span className="card-badge" style={{background:'var(--yellow)',color:'#111',border:'none'}}>&#9733;</span>
                </div>
                <div className="card-body">
                  <UpcomingWidget />
                </div>
              </div>

              <div className="card">
                <div className="card-head">
                  <span className="card-title">Assignment History</span>
                  <span className="card-badge">{history.filter(h => h.type === 'pick').length}</span>
                </div>
                <div className="card-body">
                  {history.length === 0 ? (
                    <div className="empty-state" style={{padding:'16px 0'}}>No assignments yet.</div>
                  ) : (
                    <div className="history-list">
                      {(function() {
                        let pastCycle = false;
                        return history.map(item => {
                          if (item.type === 'cycle') {
                            pastCycle = true;
                            return (
                              <div key={'cycle-' + item.id} className="cycle-marker">
                                <span className="cy-line" />
                                <span className="cy-text">⚡ New Cycle — {fmtDateTime(item.ts)}</span>
                                <span className="cy-line" />
                              </div>
                            );
                          }
                          return (
                            <div key={'pick-' + item.id} className={'history-item ' + (pastCycle ? 'prev' : 'current')}>
                              <div>
                                <div className="h-name">{item.first_name} {item.last_name}</div>
                                <div className="h-ts">{fmtDateTime(item.ts)}</div>
                              </div>
                              <span className="h-badge">&#10003; Assigned</span>
                            </div>
                          );
                        });
                      })()}
                    </div>
                  )}
                </div>
              </div>

              <ResetCard onReset={handleReset} />
            </div>
          </div>
        )}
      </main>

      {/* ── Overlays ── */}
      {view === 'assigner' && pendingPick && (
        <PickModal pick={pendingPick} onConfirm={handleConfirm} onUnavailable={handleUnavailable} />
      )}
      {toast && (
        <Toast key={toast.message + Date.now()} message={toast.message} type={toast.type} onDone={() => setToast(null)} />
      )}
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
